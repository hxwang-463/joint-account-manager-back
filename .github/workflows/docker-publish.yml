name: Publish Docker image

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_NAME: kaikai463/joint-account-manager

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # The image tag follows <version> in pom.xml, so a release is driven by
      # bumping the pom rather than by remembering to tag the image by hand.
      - name: Read project version from pom.xml
        id: pom
        run: |
          version=$(python3 -c "
          import xml.etree.ElementTree as ET
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          root = ET.parse('pom.xml').getroot()
          print(root.find('m:version', ns).text.strip())
          ")
          echo "Project version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull requests build the image to prove the Dockerfile still works, but
      # never log in or push.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.pom.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
