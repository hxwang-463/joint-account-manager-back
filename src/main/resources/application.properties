spring.application.name=joint-account-manager


server.port=${SERVER_PORT:8080}

# datasource
# All values are overridable by environment variable so that no credential is
# baked into the published container image.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jointacct?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/New_York}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Liquibase owns the schema. Hibernate only checks that the entities match what
# Liquibase built and fails fast on drift; it never alters the database itself.
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

logging.level.root=${LOG_LEVEL:INFO}

# Return RFC 9457 problem details, so a rejected request explains itself in the
# "detail" field (already paid, no linked balance entry) instead of arriving as a
# bare status code. server.error.include-message does not cover
# ResponseStatusException in Boot 4; this does.
spring.mvc.problemdetails.enabled=true
